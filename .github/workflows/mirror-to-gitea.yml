name: Mirror protected branches to Gitea

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: mirror-to-gitea-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror ${{ github.ref_name }} to Gitea
    runs-on: [self-hosted, polytryhard-mirror]

    steps:
      - name: Checkout exact GitHub commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Configure SSH for Gitea
        shell: bash
        env:
          GITEA_MIRROR_SSH_KEY: ${{ secrets.GITEA_MIRROR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh "$RUNNER_TEMP/gitea-ssh"

          cat > "$RUNNER_TEMP/gitea-ssh/known_hosts" <<'EOF'
          [git.critterhaus.net]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEBqtvB3T+xpddn7tP7lZn1ZJJjA/uVSGEw0UXO3yQOH
          EOF

          if [ -n "${GITEA_MIRROR_SSH_KEY:-}" ]; then
            KEY_PATH="$RUNNER_TEMP/gitea-ssh/gitea_mirror"
            printf '%s\n' "$GITEA_MIRROR_SSH_KEY" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
          elif [ -f ~/.ssh/polytryhard-github-mirror ]; then
            KEY_PATH="$HOME/.ssh/polytryhard-github-mirror"
          else
            echo "No GITEA_MIRROR_SSH_KEY secret and no ~/.ssh/polytryhard-github-mirror key on runner." >&2
            exit 1
          fi

          cat > "$RUNNER_TEMP/gitea-ssh/config" <<EOF
          Host gitea-polytryhard
            HostName git.critterhaus.net
            Port 2222
            User git
            IdentityFile $KEY_PATH
            IdentitiesOnly yes
            UserKnownHostsFile $RUNNER_TEMP/gitea-ssh/known_hosts
            StrictHostKeyChecking yes
          EOF
          chmod 600 "$RUNNER_TEMP/gitea-ssh/config"
          echo "GIT_SSH_COMMAND=ssh -F $RUNNER_TEMP/gitea-ssh/config" >> "$GITHUB_ENV"

      - name: Mirror branch to Gitea
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          REMOTE="gitea-polytryhard:homelab/polytryhard.git"
          if git remote get-url gitea >/dev/null 2>&1; then
            git remote set-url gitea "$REMOTE"
          else
            git remote add gitea "$REMOTE"
          fi

          if git ls-remote --exit-code --heads gitea "$BRANCH" >/dev/null 2>&1; then
            git fetch gitea "refs/heads/${BRANCH}:refs/remotes/gitea/${BRANCH}"
            EXPECTED="$(git rev-parse "refs/remotes/gitea/${BRANCH}")"
            git push --force-with-lease="refs/heads/${BRANCH}:${EXPECTED}" gitea "${GITHUB_SHA}:refs/heads/${BRANCH}"
          else
            git push gitea "${GITHUB_SHA}:refs/heads/${BRANCH}"
          fi

          GITEA_SHA="$(git ls-remote gitea "refs/heads/${BRANCH}" | awk '{print $1}')"
          test "$GITEA_SHA" = "$GITHUB_SHA"
          echo "Mirrored ${BRANCH} to Gitea at ${GITEA_SHA}."

      - name: Clean up temporary SSH material
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/gitea-ssh"
