name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  ui:
    name: UI checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps for OpenAPI export
        run: python -m pip install -r requirements-dev.txt
        working-directory: .

      - name: Export OpenAPI and check generated types drift
        working-directory: .
        env:
          REQUIRE_DBS: "0"
          CONTROL_PLANE_TOKEN: ci-export
        run: |
          python scripts/export_openapi.py
          npm run regen-api-types --prefix ui
          git diff --exit-code ui/openapi/openapi.json ui/src/lib/api/types.ts

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    env:
      REQUIRE_DBS: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: mypy core tests

      - name: Test
        run: pytest -v

  docker:
    name: Docker build (API + UI)
    runs-on: ubuntu-latest
    needs: [ui, backend]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t polytryhard-api:ci .

      - name: Build UI Docker image
        run: |
          docker build -f Dockerfile.ui \
            --build-arg PUBLIC_BACKEND_URL=http://localhost:8080 \
            --build-arg PUBLIC_BACKEND_TOKEN=ci \
            -t polytryhard-ui:ci .

# Bankroll purity: tests/test_ledger_purity_guard.py (AST scan; only core/ledger/writer.py may assign bankroll_cents).
