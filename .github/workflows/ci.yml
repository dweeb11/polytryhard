name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  ui:
    name: UI checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-ui:
    name: Docker build (UI)
    runs-on: ubuntu-latest
    needs: [ui]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build UI Docker image
        run: docker build -f Dockerfile.ui -t polytryhard-ui:ci .

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    env:
      REQUIRE_DBS: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: mypy core tests

      - name: Test
        run: pytest -v

  docker-api:
    name: Docker build (API)
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f Dockerfile -t polytryhard-api:ci .

# ledger-discipline returns in M2 as a Python AST check rooted at core/ledger/.
