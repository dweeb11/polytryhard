services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-dev}
      DATABASE_URL_SHARED: postgresql+psycopg://polytryhard:polytryhard@postgres:5432/polytryhard_shared
      DATABASE_URL_PER_ENV: postgresql+psycopg://polytryhard:polytryhard@postgres:5432/polytryhard_staging
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh scripts/start-api.sh

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: polytryhard
      POSTGRES_PASSWORD: polytryhard
      POSTGRES_DB: polytryhard_shared
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-local-dbs.sql:/docker-entrypoint-initdb.d/init-local-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polytryhard -d polytryhard_shared"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
